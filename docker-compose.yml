services:
  db:
    image: postgres:15
    container_name: ecommerce-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root0
      POSTGRES_DB: ecommerce
    ports:
      - "5433:5432"
    volumes:
      - ecommerce-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ecommerce-data: