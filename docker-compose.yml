version: '3.9'

services:
  db:
    image: postgres:16
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypass
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: hono-backend
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: postgres://myuser:mypass@db:5432/mydb
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  pgdata: